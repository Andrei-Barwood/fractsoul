name: ci

on:
  push:
  pull_request:

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/ingest-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/services/ingest-api/go.mod
          cache-dependency-path: backend/services/ingest-api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Lint (gofmt)
        run: test -z "$(gofmt -l .)"

      - name: Lint (go vet)
        run: go vet ./...

      - name: Tests
        run: go test ./...
