services:
  ingest-api:
    build:
      context: ./backend/services/ingest-api
      dockerfile: Dockerfile
    container_name: fractsoul-ingest-api
    environment:
      APP_PORT: "8080"
      GIN_MODE: release
      LOG_LEVEL: info
      API_AUTH_ENABLED: "${API_AUTH_ENABLED:-false}"
      API_RBAC_ENABLED: "${API_RBAC_ENABLED:-false}"
      API_KEY_HEADER: "${API_KEY_HEADER:-X-API-Key}"
      API_KEYS: "${API_KEYS:-local-dev-key}"
      API_DEFAULT_ROLE: "${API_DEFAULT_ROLE:-admin}"
      API_KEY_ROLES: "${API_KEY_ROLES:-local-dev-key:admin}"
      NATS_URL: nats://nats:4222
      TELEMETRY_SUBJECT: telemetry.raw.v1
      TELEMETRY_STREAM: TELEMETRY
      TELEMETRY_DLQ_SUBJECT: telemetry.dlq.v1
      TELEMETRY_CONSUMER_DURABLE: telemetry-processor-v1
      PROCESSOR_MAX_DELIVER: "5"
      PROCESSOR_RETRY_DELAY: 2s
      INGEST_MAX_BODY_BYTES: "1048576"
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/mining?sslmode=disable
      TELEMETRY_PROCESSOR_ENABLED: "true"
      ALERTS_ENABLED: "true"
      ALERT_SUPPRESS_WINDOW: 10m
      ALERT_NOTIFY_TIMEOUT: 3s
      ALERT_NOTIFY_RETRIES: "3"
      ALERT_NOTIFY_BACKOFF: 500ms
      ALERT_QUEUE_SIZE: "256"
      ALERT_WORKER_COUNT: "2"
      ALERT_WEBHOOK_ENABLED: "false"
      ALERT_EMAIL_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  energy-orchestrator:
    build:
      context: ./backend/services/energy-orchestrator
      dockerfile: Dockerfile
    container_name: fractsoul-energy-orchestrator
    environment:
      APP_PORT: "8081"
      GIN_MODE: release
      LOG_LEVEL: info
      API_AUTH_ENABLED: "${API_AUTH_ENABLED:-false}"
      API_RBAC_ENABLED: "${API_RBAC_ENABLED:-false}"
      API_KEY_HEADER: "${API_KEY_HEADER:-X-API-Key}"
      API_KEYS: "${API_KEYS:-local-dev-key}"
      API_DEFAULT_ROLE: "${API_DEFAULT_ROLE:-admin}"
      API_KEY_ROLES: "${API_KEY_ROLES:-local-dev-key:admin}"
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/mining?sslmode=disable
      ENERGY_EVENTS_ENABLED: "true"
      NATS_URL: nats://nats:4222
      ENERGY_STREAM: ENERGY
      FRACTSOUL_API_BASE_URL: http://ingest-api:8080
      FRACTSOUL_API_KEY: "${FRACTSOUL_API_KEY:-local-dev-key}"
      FRACTSOUL_API_TIMEOUT: 5s
      ENERGY_CONTEXT_RACK_LIMIT: "3"
      ENERGY_CONTEXT_WINDOW_MINUTES: "60"
    ports:
      - "8081:8081"
    depends_on:
      ingest-api:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  daily-reporter:
    build:
      context: ./backend/services/ingest-api
      dockerfile: Dockerfile.reporter
    container_name: fractsoul-daily-reporter
    command:
      - "-mode=daemon"
    environment:
      LOG_LEVEL: info
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/mining?sslmode=disable
      REPORT_TIMEZONE: America/Santiago
      REPORT_SCHEDULE: "08:00"
      REPORT_RUN_ON_STARTUP: "true"
      REPORT_OUTPUT_DIR: /reports
    volumes:
      - ./docs/reports:/reports
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: fractsoul-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mining
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./infra/docker/timescaledb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mining"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nats:
    image: nats:2.10-alpine
    container_name: fractsoul-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  timescaledb-data:
